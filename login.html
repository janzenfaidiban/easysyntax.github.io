<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk — EasySyntax</title>
    <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,600;0,700;0,800;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={theme:{extend:{fontFamily:{sans:['"Plus Jakarta Sans"','sans-serif']},colors:{brandBlue:'#3B82F6',brandBlueDark:'#1D4ED8'}}}}</script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="assets/js/app.js"></script>
</head>
<body class="bg-[#F0F7FF] text-slate-900 font-sans antialiased text-lg min-h-screen flex flex-col">

<!-- ▸ Navbar -->
<div data-include="partials/navbar.html"></div>

<!-- ══════════════ LOGIN ══════════════ -->
<section class="flex-1 flex items-center justify-center px-6 py-20">
    <div class="w-full max-w-md">
        <!-- Card -->
        <div class="card-flat bg-white rounded-[2.5rem] border-4 border-slate-200 p-10 text-center">
            <!-- Logo -->
            <div class="flex justify-center mb-6">
                <img src="assets/img/logo.svg" alt="EasySyntax" class="w-16 h-16">
            </div>
            <h1 class="text-3xl font-black tracking-tighter mb-2">Masuk ke Easy<span class="text-indigo-600">Syntax</span></h1>
            <p class="text-slate-500 font-semibold mb-10">Gunakan akun Google untuk mulai belajar coding.</p>

            <!-- Google Sign-In Button -->
            <button onclick="alert('Google OAuth akan diintegrasikan di Laravel.')"
                class="btn-flat bg-white border-slate-300 text-slate-800 w-full py-4 rounded-2xl font-black text-lg flex items-center justify-center gap-3 hover:bg-slate-50 transition-colors mb-4">
                <svg class="w-6 h-6" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                <i class="fa-solid fa-arrow-right-to-bracket mr-1"></i> Masuk dengan Google
            </button>

            <!-- Divider -->
            <div class="flex items-center gap-4 my-8">
                <div class="flex-1 h-[3px] bg-slate-200 rounded-full"></div>
                <span class="text-slate-400 font-bold text-lg uppercase tracking-widest">atau</span>
                <div class="flex-1 h-[3px] bg-slate-200 rounded-full"></div>
            </div>

            <!-- Admin Login (secondary) -->
            <div x-data="{ showAdmin: false }">
                <button @click="showAdmin = !showAdmin" class="text-slate-400 font-bold text-lg hover:text-indigo-600 transition-colors">
                    <i class="fa-solid fa-shield-halved mr-1"></i> Login sebagai Admin
                </button>
                <div x-show="showAdmin" x-transition class="mt-6 text-left space-y-4">
                    <div>
                        <label class="block font-black text-lg text-slate-700 mb-1">Email Admin</label>
                        <input type="email" placeholder="admin@easysyntax.id"
                            class="w-full px-5 py-3 rounded-xl border-4 border-slate-200 font-semibold text-lg focus:border-indigo-400 focus:outline-none transition-colors">
                    </div>
                    <div>
                        <label class="block font-black text-lg text-slate-700 mb-1">Password</label>
                        <input type="password" placeholder="••••••••"
                            class="w-full px-5 py-3 rounded-xl border-4 border-slate-200 font-semibold text-lg focus:border-indigo-400 focus:outline-none transition-colors">
                    </div>
                    <button onclick="alert('Login admin akan diintegrasikan di Laravel.')"
                        class="btn-flat bg-slate-900 border-slate-700 text-white w-full py-4 rounded-2xl font-black uppercase text-lg mt-2">
                        <i class="fa-solid fa-right-to-bracket mr-2"></i> Login Admin
                    </button>
                </div>
            </div>
        </div>

        <!-- Back link -->
        <div class="text-center mt-8">
            <a href="index.html" class="text-slate-400 font-bold text-lg hover:text-indigo-600 transition-colors">
                <i class="fa-solid fa-arrow-left mr-1"></i> Kembali ke Beranda
            </a>
        </div>
    </div>
</section>

<!-- ▸ Partials -->
<div data-include="partials/footer.html"></div>
<div data-include="partials/modal-syarat.html"></div>
</body>
</html>
